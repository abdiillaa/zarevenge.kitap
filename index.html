
<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Оқылған Кітаптар</title>
    <style>
        /* Жалпы беттің стилі */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #2c3e50;
            text-transform: uppercase;
            border-bottom: 2px solid #2c3e50;
            display: inline-block;
            padding-bottom: 10px;
        }

        /* Кітаптар контейнері */
        .book-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-bottom: 50px;
        }

        /* Әр кітаптың блогы */
        .book-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            text-align: center;
        }

        .book-card:hover {
            transform: translateY(-10px);
        }

        .book-card img {
            border-radius: 5px;
            object-fit: cover;
        }

        .month-title {
            width: 100%;
            text-align: center;
            background: #2c3e50;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-top: 30px;
        }
    </style>
</head>
